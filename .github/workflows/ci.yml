name: Cx CI

on:
  push:
    branches:
      - main
      - submain
      - 'backend/**'
      - 'codex/backend-**'
      - 'claude/**'
  pull_request:
    branches:
      - main
      - submain

jobs:
  frontend:
    name: Frontend Build + Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (no features)
        run: cargo build

      - name: Run verification matrix
        run: |
          set +e
          PASS=0
          FAIL=0
          ERRORS=()

          for f in src/tests/verification_matrix/t*.cx; do
            test_name=$(basename "$f")
            expected_fail=false

            if [ -f "${f}.expected_fail" ]; then
              expected_fail=true
            fi

            cargo run --quiet -- "$f" > /dev/null 2>&1
            exit_code=$?

            if $expected_fail; then
              if [ $exit_code -ne 0 ]; then
                echo "PASS (expected fail): $test_name"
                PASS=$((PASS + 1))
              else
                echo "FAIL (should have errored): $test_name"
                FAIL=$((FAIL + 1))
                ERRORS+=("$test_name")
              fi
            else
              if [ $exit_code -eq 0 ]; then
                echo "PASS: $test_name"
                PASS=$((PASS + 1))
              else
                echo "FAIL: $test_name"
                output=$(cargo run --quiet -- "$f" 2>&1)
                echo "  Output: $output"
                FAIL=$((FAIL + 1))
                ERRORS+=("$test_name")
              fi
            fi
          done

          echo ""
          echo "Matrix: $PASS passed, $FAIL failed out of $((PASS + FAIL)) total"

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo ""
            echo "Failed tests:"
            for e in "${ERRORS[@]}"; do
              echo "  - $e"
            done
            exit 1
          fi

  backend:
    name: Backend Build + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-jit-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (with jit feature)
        run: cargo build --features jit

      - name: Run tests (with jit feature)
        run: cargo test --features jit

  stale-base:
    name: Stale Base Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check how far behind submain
        run: |
          git fetch origin submain
          BEHIND=$(git rev-list --count HEAD..origin/submain)
          echo "Branch is $BEHIND commits behind submain"
          if [ "$BEHIND" -gt 20 ]; then
            echo "STALE BASE: This branch is $BEHIND commits behind submain."
            echo "Rebase onto submain before merging."
            exit 1
          fi

  branch-guard:
    name: Block Direct Push to Main
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !startsWith(github.event.head_commit.message, 'Merge')
    steps:
      - name: Reject direct push
        run: |
          echo "Direct pushes to main are not allowed."
          echo "Open a PR from submain or a feature branch."
          exit 1
