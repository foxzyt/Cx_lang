name: Cx CI

on:
  push:
    branches:
      - main
      - submain
      - 'backend/**'
      - 'codex/backend-**'
      - 'claude/**'
  pull_request:
    branches:
      - main
      - submain

jobs:
  frontend:
    name: Frontend Build + Matrix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (no features)
        run: cargo build

      - name: Run verification matrix
        run: |
          set +e
          PASS=0
          FAIL=0
          ERRORS=()

          for f in src/tests/verification_matrix/t*.cx; do
            test_name=$(basename "$f")
            expected_fail=false

            if [ -f "${f}.expected_fail" ]; then
              expected_fail=true
            fi

            cargo run --quiet -- "$f" > /dev/null 2>&1
            exit_code=$?

            if $expected_fail; then
              if [ $exit_code -ne 0 ]; then
                echo "PASS (expected fail): $test_name"
                PASS=$((PASS + 1))
              else
                echo "FAIL (should have errored): $test_name"
                FAIL=$((FAIL + 1))
                ERRORS+=("$test_name")
              fi
            else
              if [ $exit_code -eq 0 ]; then
                echo "PASS: $test_name"
                PASS=$((PASS + 1))
              else
                echo "FAIL: $test_name"
                output=$(cargo run --quiet -- "$f" 2>&1)
                echo "  Output: $output"
                FAIL=$((FAIL + 1))
                ERRORS+=("$test_name")
              fi
            fi
          done

          echo ""
          echo "Matrix: $PASS passed, $FAIL failed out of $((PASS + FAIL)) total"

          if [ ${#ERRORS[@]} -gt 0 ]; then
            echo ""
            echo "Failed tests:"
            for e in "${ERRORS[@]}"; do
              echo "  - $e"
            done
            exit 1
          fi

  backend:
    name: Backend Build + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-jit-${{ hashFiles('**/Cargo.lock') }}

      - name: Build (with jit feature)
        run: cargo build --features jit

      - name: Run tests (with jit feature)
        run: cargo test --features jit

  stale-base:
    name: Stale Base Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check how far behind submain
        run: |
          git fetch origin submain
          BEHIND=$(git rev-list --count HEAD..origin/submain)
          echo "Branch is $BEHIND commits behind submain"
          if [ "$BEHIND" -gt 20 ]; then
            echo "STALE BASE: This branch is $BEHIND commits behind submain."
            echo "Rebase onto submain before merging."
            exit 1
          fi

  branch-guard:
    name: Block Direct Push to Protected Branches
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/submain')
    permissions:
      pull-requests: read
    steps:
      - name: Verify push came from merged PR
        id: verify_pr_merge
        uses: actions/github-script@v7
        with:
          script: |
            const protectedRef = context.ref.replace('refs/heads/', '');
            const sha = context.sha;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            const allowed = prs.some((pr) => {
              return pr.merged_at &&
                pr.merge_commit_sha === sha &&
                pr.base &&
                pr.base.ref === protectedRef;
            });

            core.info(`Protected ref: ${protectedRef}`);
            core.info(`Associated PR count: ${prs.length}`);
            core.info(`Allowed merged PR push: ${allowed}`);
            core.setOutput('allowed', String(allowed));

      - name: Reject direct push
        if: steps.verify_pr_merge.outputs.allowed != 'true'
        run: |
          echo "Direct pushes to main or submain are not allowed."
          echo "Merge through a GitHub pull request targeting the protected branch."
          exit 1
